<!DOCTYPE html>
<html>
<head><title>Авторизация...</title></head>
<body style="background: #121212; color: white; font-family: sans-serif; text-align: center; padding-top: 50px;">
    <h2 id="status">Проверка данных...</h2>
    <script>
        // Достаем параметры из ссылки (f-list их туда допишет)
        const urlParams = new URLSearchParams(window.location.search);
        const account = urlParams.get('account');

        if (account && window.opener) {
            // Передаем реальный ник в главное окно
            window.opener.postMessage({ type: "f_list_success", user: account }, "*");
            document.getElementById('status').innerText = "Готово! Вход выполнен как " + account;
            setTimeout(() => window.close(), 1200);
        } else {
            document.getElementById('status').innerText = "Ошибка: Данные не получены.";
        }
    </script>
</body>
</html>
