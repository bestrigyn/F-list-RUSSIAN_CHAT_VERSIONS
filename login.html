<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>F-LIST LOGIN</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding: 40px; }
        input { background: #222; border: 1px solid #444; color: white; padding: 10px; width: 80%; margin-bottom: 20px; }
        button { background: #d62d2d; color: white; border: none; padding: 10px 30px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h2 style="color:#d62d2d;">F-LIST LOGIN</h2>
    <p>Введите ваш ник:</p>
    <input type="text" id="username" placeholder="bestrigyn1">
    <br>
    <button onclick="auth()">ВОЙТИ</button>

    <script>
        function auth() {
            const user = document.getElementById('username').value;
            if (user) {
                // Это передает данные в Rust
                window.opener.postMessage({ account: user }, "*");
                window.close();
            }
        }
    </script>
</body>
</html>
