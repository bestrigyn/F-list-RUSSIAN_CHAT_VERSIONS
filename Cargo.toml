[package]
name = "flist-russian-chat"
version = "0.1.0"
edition = "2021"

[dependencies]
leptos = { version = "0.6", features = ["csr"] }
# Используем gloo-net вместо тяжелого reqwest для WASM
gloo-net = { version = "0.5", features = ["http"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
wasm-bindgen = "0.2"
