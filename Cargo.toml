[package]
name = "flist-russian-chat"
version = "0.1.0"
edition = "2021"

[dependencies]
leptos = { version = "0.6", features = ["csr"] }
# Убираем ручное управление web-sys, Leptos сам подтянет нужную версию
# Но если нужны специфичные фичи, пишем их так:
web-sys = { version = "0.3", features = ["Storage", "Window", "Local_storage"] }
wasm-bindgen = "0.2"
